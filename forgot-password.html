<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — AuthFlow</title>
  <meta name="description" content="Reset your AuthFlow password — we'll send you a secure link." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="auth-bg"></div>

  <main class="auth-wrapper" role="main">
    <div class="glass-card">

      <!-- Brand -->
      <div class="brand-logo">
        <div class="brand-icon" style="background:linear-gradient(135deg,#f59e0b,#ef4444);">🔑</div>
        <span class="brand-name">AuthFlow</span>
      </div>

      <!-- Initial State -->
      <div id="initialState">
        <h1 class="auth-title">Forgot password?</h1>
        <p class="auth-subtitle">No worries — we'll send a reset link to your inbox.</p>

        <form id="forgotForm" novalidate>

          <!-- Email -->
          <div class="form-floating-custom mb-lg">
            <input
              type="email"
              id="forgotEmail"
              class="form-control-custom"
              placeholder="Email address"
              autocomplete="email"
              required
            />
            <label for="forgotEmail">Email address</label>
          </div>

          <button type="submit" class="btn-primary-glow" id="forgotBtn"
                  style="background:linear-gradient(135deg,#f59e0b,#ef4444,#6c63ff);background-size:200% 200%;">
            <span class="btn-label">Send Reset Link</span>
            <span class="dots"><span></span><span></span><span></span></span>
          </button>

        </form>
      </div>

      <!-- Success State -->
      <div id="successState" style="display:none; animation: cardFadeIn 0.5s ease both;">
        <div class="success-card">
          <div class="success-icon">📬</div>
          <h2 style="font-size:1.15rem;font-weight:700;margin-bottom:0.4rem;">Check your inbox</h2>
          <p class="success-msg">
            We've sent a password reset link to your email address. It may take a few minutes to arrive.
          </p>
        </div>

        <button type="button" class="btn-ghost" onclick="resendEmail()">
          ↩ &nbsp;Resend email
        </button>
      </div>

      <p class="auth-footer-text mt-md">
        Remember your password?
        <a href="index.html" class="auth-link">Back to sign in</a>
      </p>

    </div>
  </main>

  <script>
    document.querySelectorAll('.btn-primary-glow').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const r = document.createElement('span');
        r.className = 'ripple';
        const rect = this.getBoundingClientRect(), s = Math.max(rect.width, rect.height);
        r.style.cssText = `width:${s}px;height:${s}px;left:${e.clientX - rect.left - s/2}px;top:${e.clientY - rect.top - s/2}px;`;
        this.appendChild(r);
        setTimeout(() => r.remove(), 600);
      });
    });

    document.getElementById('forgotForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const btn = document.getElementById('forgotBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      setTimeout(() => {
        document.getElementById('initialState').style.display = 'none';
        document.getElementById('successState').style.display = 'block';
      }, 1800);
    });

    function resendEmail() {
      document.getElementById('initialState').style.display = 'block';
      document.getElementById('successState').style.display = 'none';
      const btn = document.getElementById('forgotBtn');
      btn.classList.remove('loading');
      btn.disabled = false;
      document.getElementById('forgotEmail').value = '';
    }
  </script>

</body>
</html>
