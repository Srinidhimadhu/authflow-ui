<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AuthFlow</title>
  <meta name="description" content="Sign in to AuthFlow — your secure, premium authentication platform." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Animated Background -->
  <div class="auth-bg"></div>

  <main class="auth-wrapper" role="main">
    <div class="glass-card">

      <!-- Brand -->
      <div class="brand-logo">
        <div class="brand-icon">✦</div>
        <span class="brand-name">AuthFlow</span>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue to your account</p>

      <form id="loginForm" novalidate>

        <!-- Email -->
        <div class="form-floating-custom">
          <input
            type="email"
            id="email"
            class="form-control-custom"
            placeholder="Email address"
            autocomplete="email"
            required
          />
          <label for="email">Email address</label>
        </div>

        <!-- Password -->
        <div class="form-floating-custom">
          <div class="input-icon-wrap">
            <input
              type="password"
              id="password"
              class="form-control-custom"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
            <label for="password">Password</label>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
              <span id="eyeIcon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
            </button>
          </div>
        </div>

        <!-- Remember me & Forgot -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;">
          <label class="form-check-custom" style="margin-bottom:0;">
            <input type="checkbox" id="remember" />
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" class="auth-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary-glow" id="loginBtn">
          <span class="btn-label">Sign In</span>
          <span class="dots">
            <span></span><span></span><span></span>
          </span>
        </button>

      </form>

      <div class="divider">or</div>

      <!-- Social hint -->
      <button type="button" class="btn-ghost" onclick="window.location.href='register.html'">
        🚀 &nbsp;Create a new account
      </button>

      <p class="auth-footer-text">
        Don't have an account?
        <a href="register.html" class="auth-link">Sign up free</a>
      </p>

    </div>
  </main>

  <script>
    // ── Password toggle ─────────────────────────────────────
    const togglePw = document.getElementById('togglePw');
    const pwInput  = document.getElementById('password');
    const eyeIcon  = document.getElementById('eyeIcon');

    const eyeSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeOffSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    let shown = false;
    togglePw.addEventListener('click', () => {
      shown = !shown;
      pwInput.type = shown ? 'text' : 'password';
      eyeIcon.innerHTML = shown ? eyeOffSVG : eyeSVG;
    });

    // ── Ripple ──────────────────────────────────────────────
    document.querySelectorAll('.btn-primary-glow').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px;`;
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });

    // ── Form submit (simulate) ──────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      setTimeout(() => {
        btn.classList.remove('loading');
        btn.disabled = false;
        window.location.href = 'dashboard.html';
      }, 1800);
    });
  </script>

</body>
</html>
